<!-- CONFIRMACIÓN -->
<div id="confirmModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-lg shadow-xl w-96 transform transition-all scale-100">
        <h3 class="text-lg font-bold text-gray-900 mb-2">Confirmar Acción</h3>
        <p id="confirmMessage" class="text-gray-600 mb-6">¿Estás seguro?</p>
        <div class="flex justify-end gap-3">
            <button onclick="closeConfirmModal()" class="px-4 py-2 text-gray-500 hover:text-gray-700 font-medium">Cancelar</button>
            <button id="confirmBtn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 font-medium">Confirmar</button>
        </div>
    </div>
</div>
