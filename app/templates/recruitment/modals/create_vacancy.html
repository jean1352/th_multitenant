<div id="createVacancyModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title"
    role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"
            onclick="closeModal('createVacancyModal')"></div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
        <div
            class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <h3 class="text-lg leading-6 font-medium text-gray-900">Nueva Vacante</h3>
                <form id="createVacancyForm" class="mt-4 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Título de la Publicación</label>
                        <input type="text" name="title" required placeholder="Ej: Analista de Marketing"
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border p-2">
                    </div>

                    <!-- CASCADA: SEDE -> AREA -> CARGO -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Sede</label>
                            <select id="sede_select"
                                class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border p-2 bg-white"
                                onchange="loadAreas(this.value)">
                                <option value="">Seleccione Sede...</option>
                                {% for sede in sedes %}
                                <option value="{{ sede.id }}">{{ sede.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Área Solicitante</label>
                            <select name="area_id" id="area_select" required disabled
                                class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border p-2 bg-gray-50"
                                onchange="loadPositions(this.value)">
                                <option value="">Primero seleccione Sede</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Cargo / Puesto (Estructura)</label>
                        <select name="position_id" id="position_select" required disabled
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border p-2 bg-gray-50">
                            <option value="">Primero seleccione Área</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Proceso de Selección</label>
                        <select name="process_id" required
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border p-2 bg-white">
                            <option value="">Seleccione Plantilla...</option>
                            {% for proc in processes %}
                            <option value="{{ proc.id }}">{{ proc.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Motivo de Contratación</label>
                        <select name="hiring_reason_id"
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border p-2 bg-white">
                            <option value="">Seleccione Motivo...</option>
                            {% for reason in hiring_reasons %}
                            <option value="{{ reason.id }}">{{ reason.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Responsable / Reclutador</label>
                        <select name="recruiter_id"
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border p-2 bg-white">
                            <option value="">Asignar a...</option>
                            {% for u in recruiters %}
                            <option value="{{ u.id }}" {% if current_user.id==u.id %}selected{% endif %}>{{ u.full_name
                                }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="flex items-center">
                        <input id="is_headcount_increase" name="is_headcount_increase" type="checkbox"
                            class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                        <label for="is_headcount_increase" class="ml-2 block text-sm text-gray-900">
                            Es aumento de dotación (Nuevo puesto)
                        </label>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Descripción / Perfil</label>
                        <textarea name="description" rows="3" required
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border p-2"></textarea>
                    </div>
                </form>
            </div>
            <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                <button type="button" id="btnSaveVacancy"
                    class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-900 text-base font-medium text-white hover:bg-blue-800 sm:ml-3 sm:w-auto sm:text-sm">Guardar</button>
                <button type="button" onclick="closeModal('createVacancyModal')"
                    class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">Cancelar</button>
            </div>
        </div>
    </div>
</div>
