<div id="stageModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog"
    aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closeStageModal()"></div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
        <div
            class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <h3 class="text-lg leading-6 font-medium text-gray-900" id="stageModalTitle">Gestionar Etapa</h3>
                <form id="stageForm" class="mt-4 space-y-4">
                    <input type="hidden" name="id" id="stageId">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Fecha Inicio</label>
                            <input type="date" name="start_date" id="start_date"
                                class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Fecha Fin (Cierre)</label>
                            <input type="date" name="end_date" id="end_date"
                                class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border p-2">
                        </div>
                    </div>

                    <!-- NUEVO CAMPO DEADLINE -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Fecha Límite (SLA)</label>
                        <input type="date" name="deadline_date" id="deadline_date"
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border p-2 bg-blue-50">
                        <p class="text-xs text-gray-400 mt-1">Modificar esto afectará el cálculo de cumplimiento.</p>
                    </div>

                    <!-- NUEVO: MOTIVO DE EDICIÓN -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Motivo de Edición <span
                                class="text-red-500">*</span></label>
                        <select name="edit_reason_id" id="edit_reason_id" required
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border p-2 bg-white"
                            onchange="checkOtherReason(this)">
                            <option value="">Seleccione Motivo...</option>
                            {% for reason in edit_reasons %}
                            <option value="{{ reason.id }}" data-name="{{ reason.name | lower }}">{{ reason.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Observaciones <span
                                id="notes_required_asterisk" class="text-red-500 hidden">*</span></label>
                        <textarea name="notes" id="notes" rows="3"
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border p-2"></textarea>
                    </div>
                </form>
            </div>
            <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                <button type="button" id="btnSaveStage"
                    class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-900 text-base font-medium text-white hover:bg-blue-800 sm:ml-3 sm:w-auto sm:text-sm">Guardar
                    Cambios</button>
                <button type="button" onclick="closeStageModal()"
                    class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<script>
    function checkOtherReason(select) {
        const option = select.options[select.selectedIndex];
        const name = option.getAttribute('data-name') || '';
        const notesAsterisk = document.getElementById('notes_required_asterisk');
        const notes = document.getElementById('notes');

        if (name.includes('otro') || name.includes('other')) {
            notesAsterisk.classList.remove('hidden');
            notes.setAttribute('required', 'required');
        } else {
            notesAsterisk.classList.add('hidden');
            notes.removeAttribute('required');
        }
    }
</script>
