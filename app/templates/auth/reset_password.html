<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - {{ tenant.name if tenant else settings.PROJECT_NAME }}</title>
    <link rel="icon" type="image/png" href="/static/images/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="text-center mb-6">
            <img src="/static/images/logo.png" alt="Logo" class="mx-auto h-16 w-16 object-contain mb-4 filter drop-shadow">
            <h1 class="text-2xl font-bold text-blue-900">Restablecer Contraseña</h1>
            <p class="text-gray-500 text-sm mt-1">Ingresa tu nueva contraseña segura.</p>
        </div>

        {% if valid %}
        <form id="resetForm" class="space-y-4">
            <input type="hidden" name="token" value="{{ token }}">
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Nueva Contraseña</label>
                <input type="password" name="new_password" id="new_password" required minlength="6" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Confirmar Contraseña</label>
                <input type="password" id="confirm_password" required minlength="6" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div id="msg" class="hidden text-center text-sm font-medium p-2 rounded"></div>

            <button type="submit" class="w-full bg-blue-900 text-white py-2 rounded-lg hover:bg-blue-800 transition font-bold">
                Guardar Contraseña
            </button>
        </form>
        {% else %}
        <div class="text-center">
            <div class="bg-red-50 text-red-700 p-4 rounded-lg mb-4">
                El enlace es inválido o ha expirado.
            </div>
            <a href="/login" class="text-blue-600 hover:underline font-medium">Volver al Login</a>
        </div>
        {% endif %}
    </div>

    <script type="module">
        import { ApiClient } from '/static/js/api_client.js';

        const form = document.getElementById('resetForm');
        if (form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const p1 = document.getElementById('new_password').value;
                const p2 = document.getElementById('confirm_password').value;
                const msg = document.getElementById('msg');
                const btn = e.target.querySelector('button');

                if (p1 !== p2) {
                    msg.innerText = "Las contraseñas no coinciden.";
                    msg.className = "text-red-600 bg-red-50 p-2 rounded block";
                    return;
                }

                btn.disabled = true;
                btn.innerText = "Procesando...";

                try {
                    const data = Object.fromEntries(new FormData(form));
                    await ApiClient.post('/api/auth/reset-password', data);
                    
                    msg.innerText = "Contraseña actualizada. Redirigiendo...";
                    msg.className = "text-green-600 bg-green-50 p-2 rounded block";
                    
                    setTimeout(() => window.location.href = '/login', 2000);
                } catch (err) {
                    msg.innerText = err.message;
                    msg.className = "text-red-600 bg-red-50 p-2 rounded block";
                    btn.disabled = false;
                    btn.innerText = "Guardar Contraseña";
                }
            });
        }
    </script>
</body>
</html>
