<script type="module">
    import { ApiClient } from '/static/js/api_client.js';

    /**
     * GRÁFICOS: Cumplimiento SLA
     * Gestiona SLA Etapas y SLA Vacante (ambos dinámicos ahora)
     */
    let slaStagesChart = null;
    let slaVacancyChart = null;

    // Función global para actualizar gráficos al cambiar el filtro de área
    window.updateStageCharts = async (areaId) => {
        try {
            const url = areaId 
                ? `/recruitment/api/dashboard/stage-stats?area_id=${areaId}` 
                : `/recruitment/api/dashboard/stage-stats`;
            
            const data = await ApiClient.get(url);
            
            renderSlaStagesChart(data.sla_stages);
            renderSlaVacancyChart(data.sla_vacancy);
            
            // Actualizar también el gráfico de Cuellos de Botella (definido en otro archivo)
            if (window.renderBottleneckChart) {
                window.renderBottleneckChart(data.bottleneck);
            }

        } catch (e) {
            console.error("Error actualizando gráficos de rendimiento:", e);
        }
    };

    function renderSlaStagesChart(data) {
        const ctx = document.getElementById('chartSlaStages').getContext('2d');
        
        if (slaStagesChart) slaStagesChart.destroy();

        slaStagesChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.labels,
                datasets: [
                    {
                        label: 'En Tiempo',
                        data: data.ok,
                        backgroundColor: '#10B981', // Verde
                        stack: 'Stack 0',
                    },
                    {
                        label: 'Vencido',
                        data: data.overdue,
                        backgroundColor: '#EF4444', // Rojo
                        stack: 'Stack 0',
                    }
                ]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { stacked: true },
                    y: { stacked: true }
                },
                plugins: {
                    legend: { position: 'bottom' },
                    datalabels: {
                        color: '#fff',
                        font: { weight: 'bold', size: 10 },
                        formatter: (value) => value > 0 ? value : ''
                    }
                }
            }
        });
    }

    function renderSlaVacancyChart(data) {
        const ctx = document.getElementById('chartSlaVacancy').getContext('2d');
        
        if (slaVacancyChart) slaVacancyChart.destroy();

        slaVacancyChart = new Chart(ctx, {
            type: 'pie',
            data: { 
                labels: Object.keys(data), 
                datasets: [{ 
                    data: Object.values(data), 
                    backgroundColor: ['#3B82F6', '#F59E0B'], // Azul / Naranja
                    borderWidth: 0 
                }] 
            },
            options: {
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { 
                    legend: { position: 'bottom' },
                    datalabels: {
                        color: '#fff',
                        font: { weight: 'bold', size: 12 },
                        formatter: (value, ctx) => {
                            let sum = 0;
                            let dataArr = ctx.chart.data.datasets[0].data;
                            dataArr.map(data => { sum += data; });
                            if (sum === 0) return "0%";
                            return (value * 100 / sum).toFixed(1) + "%";
                        }
                    }
                } 
            }
        });
    }

    // Carga inicial (sin filtro)
    window.updateStageCharts('');
</script>
