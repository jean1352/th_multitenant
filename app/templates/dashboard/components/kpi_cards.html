<!-- KPI CARDS & COBERTURA (5 Columnas) -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 mb-8">
    
    <!-- 1. Vacantes Abiertas -->
    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Abiertas</p>
                <p class="text-3xl font-bold text-blue-900 mt-1">{{ metrics.kpi.open }}</p>
            </div>
            <div class="p-2 bg-blue-50 rounded-lg text-blue-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </div>
        </div>
        <div class="mt-2 text-xs text-gray-400">Total histórico: {{ metrics.kpi.total }}</div>
    </div>

    <!-- 2. Tiempo Promedio -->
    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Tiempo Prom.</p>
                <p class="text-3xl font-bold text-gray-800 mt-1">{{ metrics.kpi.avg_days }} <span class="text-sm font-normal text-gray-500">días</span></p>
            </div>
            <div class="p-2 bg-green-50 rounded-lg text-green-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
        </div>
        <div class="mt-2 text-xs text-gray-400">Ciclo de cierre</div>
    </div>

    <!-- 3. SLA Global (Vacante) -->
    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">SLA Global</p>
                <p class="text-3xl font-bold text-gray-800 mt-1">{{ metrics.kpi.sla_rate_vacancy }}%</p>
            </div>
            <div class="p-2 bg-purple-50 rounded-lg text-purple-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
        </div>
        <div class="mt-2 w-full bg-gray-100 rounded-full h-1.5">
            <div class="bg-purple-600 h-1.5 rounded-full" style="width: {{ metrics.kpi.sla_rate_vacancy }}%"></div>
        </div>
    </div>

    <!-- 4. Asistencia Capacitación -->
    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Asistencia</p>
                <p class="text-3xl font-bold text-gray-800 mt-1">{{ metrics.kpi.attendance_rate }}%</p>
            </div>
            <div class="p-2 bg-orange-50 rounded-lg text-orange-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
        </div>
        <div class="mt-2 text-xs text-gray-400">Capacitaciones</div>
    </div>

    <!-- 5. GRÁFICO COBERTURA (MINI) -->
    <div class="bg-white p-2 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center justify-center relative">
        <p class="absolute top-3 left-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Cobertura</p>
        <div class="h-24 w-full mt-4">
            <canvas id="chartType"></canvas>
        </div>
    </div>
</div>
