<nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex items-center">
                <!-- Botón Menú Móvil -->
                <button onclick="toggleSidebar()" class="text-gray-500 hover:text-gray-700 focus:outline-none md:hidden mr-4">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>

            <!-- Perfil de Usuario -->
            <div class="flex items-center gap-4">
                {% if current_user %}
                <div class="flex items-center gap-3">
                    <div class="text-right hidden md:block">
                        <p class="text-sm font-bold text-gray-800">{{ current_user.full_name }}</p>
                        <p class="text-[10px] uppercase font-black text-gray-500">{{ current_user.role.value }}</p>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold border border-blue-200 shadow-sm">
                        {{ current_user.full_name[0]|upper }}
                    </div>
                    <a href="/logout"
                        class="text-gray-400 hover:text-red-600 transition-colors ml-2"
                        title="Cerrar Sesión">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                        </svg>
                    </a>
                </div>
                {% else %}
                <a href="/login" class="text-blue-600 hover:text-blue-800 text-sm font-bold">Ingresar al Sistema</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
