# =========================================================================
# CONFIGURACIÓN DE NGINX PARA TALENTO UP (MULTI-TENANT)
# Dominio: sectoruno.com.py y subdominios (*.sectoruno.com.py)
# Puerto de la App: 8006
# =========================================================================

server {
    listen 80;
    
    # IMPORTANTE: Capturamos tanto el dominio principal como TODOS sus subdominios
    server_name sectoruno.com.py *.sectoruno.com.py;

    # Logs de acceso y error específicos para monitoreo
    access_log /var/log/nginx/sectoruno-access.log;
    error_log /var/log/nginx/sectoruno-error.log;

    # Configuración de límites y optimización de carga de archivos (Nóminas de Excel, fotos, PDFs, etc.)
    client_max_body_size 50M;

    # Tiempos de espera para peticiones de larga duración (como reportes pesados o descargas grandes)
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    # Compresión GZIP para acelerar la carga de hojas de estilo, scripts y JSON
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        # Puerto corregido a 8006 que es el expuesto por tu docker-compose
        proxy_pass http://localhost:8006;
        
        # IMPORTANTE: Preservar el HOST original de la petición
        # Es crítico para que el TenantMiddleware detecte correctamente el subdominio (ej: cliente1.sectoruno.com.py)
        proxy_set_header Host $host;
        
        # Cabeceras estándar para propagar la IP real del cliente y protocolo original (HTTP / HTTPS)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Soporte para WebSockets / Conexiones persistentes (Uvicorn / FastAPI lo aprovecha)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
